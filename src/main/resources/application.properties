# src/main/resources/application.properties

# Server
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/mytour_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

file.upload-dir=./uploads/images
spring.web.resources.static-locations=file:./uploads/images/
spring.mvc.static-path-pattern=/uploads/images/**

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

app.jwtSecret=bG8haW1naWFzY3JvbiEgdGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3Igand0IHRva2Vu
app.jwtExpirationMs=604800000

# === EMAIL CONFIG (Gmail SMTP) ===
# Buoc tao App Password: Google Account -> Security -> 2-Step Verification -> App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mytour.demo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Email nguoi gui
app.mail.from=${MAIL_FROM:MyTour <mytour.demo@gmail.com>}